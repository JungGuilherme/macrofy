name: Sync Morning Call

on:
  # PAUSED 2026-07-16 (Supabase auth rate-limit incident) — schedule:
    # # The channel opens the video link at ~07:55 Brasília (10:55 UTC).
    # # Extra attempts cover GitHub cron delays and late uploads; the
    # # script is idempotent, so re-runs are harmless.
    # - cron: '55 10 * * 1-5'
    # - cron: '15 11 * * 1-5'
    # - cron: '0 12 * * 1-5'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync latest Morning Call video
        run: node scripts/sync-morning-call.mjs
