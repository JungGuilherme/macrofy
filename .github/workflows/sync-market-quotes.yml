name: Sync Market Quotes

on:
  schedule:
    # Every 5 minutes (GitHub's minimum; real cadence ~5–12 min under load).
    # Yahoo's free international quotes are 15–20 min delayed at the source
    # anyway; the live market-ticker overlay covers the main symbols at 60s.
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync quotes
        run: node scripts/sync-market-quotes.mjs
